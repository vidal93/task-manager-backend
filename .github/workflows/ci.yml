name: CI - Backend

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Instalar dependencias
        working-directory: functions
        run: npm ci

      # Corre los tests con reporte de cobertura para el artefacto
      - name: Ejecutar tests
        working-directory: functions
        run: npm run test:coverage

      # Guarda el reporte para revisarlo desde la pestaña Actions de GitHub
      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: functions/coverage/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test # Solo compila si los tests pasaron

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Instalar dependencias
        working-directory: functions
        run: npm ci

      - name: Compilar TypeScript
        working-directory: functions
        run: npm run build

  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    needs: build # Solo despliega si el build fue exitoso
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Instalar dependencias
        working-directory: functions
        run: npm ci

      - name: Compilar TypeScript
        working-directory: functions
        run: npm run build

      # Autentica con la service account configurada en los secrets del repositorio
      - name: Autenticar con Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Evita acumulación de imágenes antiguas en Artifact Registry
      - name: Configurar política de limpieza de Artifact Registry
        run: npx firebase-tools functions:artifacts:setpolicy --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}

      - name: Deploy to Firebase Functions
        run: npx firebase-tools deploy --only functions --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
